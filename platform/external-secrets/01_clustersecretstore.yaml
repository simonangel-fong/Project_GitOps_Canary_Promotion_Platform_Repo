# platform/external-secrets/01_clustersecretstore.yaml
# Cluster-wide SecretStore backed by AWS SSM Parameter Store.
# Authentication uses the IRSA role annotated on the
# external-secrets ServiceAccount (provisioned in the infra repo).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: ca-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

{{- if .Values.slack.ssmKey }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.slack.secretName | quote }}
  namespace: {{ .Values.slack.namespace | quote }}
spec:
  refreshPolicy: Periodic
  refreshInterval: {{ .Values.slack.refreshInterval | quote }}
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: {{ .Values.slack.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.slack.secretKey | quote }}
      remoteRef:
        key: {{ .Values.slack.ssmKey | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}

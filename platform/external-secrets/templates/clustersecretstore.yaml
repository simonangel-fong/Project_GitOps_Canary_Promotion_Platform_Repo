apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.aws.serviceAccount.name | quote }}
            namespace: {{ .Values.aws.serviceAccount.namespace | quote }}

# bootstrap/80_external-secrets.yaml
# Installs External Secrets Operator via the official Helm chart.
# IRSA role for SSM access is provisioned in the infra (Terraform) repo;
# its ARN is supplied here via serviceAccount.annotations.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-80-external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "80"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.20.3
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true

        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            # Replace with the eso_role_arn output from Terraform.
            eks.amazonaws.com/role-arn: REPLACE_WITH_ESO_ROLE_ARN

        # The webhook and cert-controller subcharts inherit the parent SA
        # unless overridden. Leave defaults — they don't need AWS access.

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        certController:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

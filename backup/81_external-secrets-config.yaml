# bootstrap/81_external-secrets-config.yaml
# ClusterSecretStore + ExternalSecret CRs. Syncs after the ESO controller
# (and its CRDs) are installed by sync-wave 80.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-81-external-secrets-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "81"
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
    targetRevision: main
    path: platform/external-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true

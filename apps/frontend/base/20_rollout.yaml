apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-demo-frontend
spec:
  # replicas is intentionally omitted — the HPA owns it.
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-demo-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-demo-frontend
    spec:
      serviceAccountName: gitops-demo-frontend
      containers:
        - name: gitops-demo-frontend
          image: gitops-demo-frontend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # Same value across envs — each cluster runs its own backend
            # in the "backend" namespace.
            - name: BACKEND_URL
              value: "http://gitops-demo-backend.backend.svc.cluster.local:8080"
            - name: NGINX_ENVSUBST_FILTER
              value: "BACKEND_URL"
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 100
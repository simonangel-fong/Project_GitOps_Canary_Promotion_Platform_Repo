apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-demo-backend
spec:
  # replicas is intentionally omitted — the HPA owns it.
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-demo-backend
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-demo-backend
    spec:
      serviceAccountName: gitops-demo-backend
      containers:
        - name: gitops-demo-backend
          image: gitops-demo-backend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
          - name: BACKEND_VERSION
            value: "0.3.0"
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

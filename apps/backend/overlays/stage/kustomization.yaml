apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backend

resources:
  - ../../base

images:
  # CI writes newTag (and adds digest:) on promotion from dev.
  - name: gitops-demo-backend
    newName: docker.io/simonangelfong/gitops-demo-backend
    newTag: stage-PLACEHOLDER

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-demo-backend-stage
      env: stage

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-demo-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 70

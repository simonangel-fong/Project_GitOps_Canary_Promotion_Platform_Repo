apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backend
resources:
  - ../../base
images:
  - name: gitops-backend
    newName: docker.io/simonangelfong/gitops-demo-backend
    newTag: v0.3.1
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-backend
      env: dev
patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 4
      - op: replace
        path: /spec/maxReplicas
        value: 6
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 60
  - target:
      kind: Rollout
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "0.3.1"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "green"
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "false"
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "jdbc:postgresql://postgres:5432/demo_db"
      ###########################
      # Scenario 3b rehearsal (OOM caught by AnalysisTemplate):
      # OOM_ENABLE=true, OOM_TIME=3. App OOMs ~3min after start.
      # Long-canary strategy below holds at 25% for 10min — OOM fires
      # inside the window, AnalysisTemplate sees the restart, rollout aborts.
      # NOTE: this is dev temporarily mirroring stage config for video capture.
      # Revert env/4 to "false" and env/5 to "1", and revert the strategy patch
      # below, once Scenario 3b has been recorded.
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: "true"
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "3"
      # Long canary + analysis (rehearsal of stage config — see note above).
      - op: replace
        path: /spec/progressDeadlineSeconds
        value: 900
      - op: replace
        path: /spec/strategy/canary/steps
        value:
          - setWeight: 25
          - pause: { duration: 10m }
          - analysis:
              templates:
                - templateName: backend-memory-health
          - setWeight: 50
          - pause: { duration: 10m }
          - analysis:
              templates:
                - templateName: backend-memory-health
          - setWeight: 100
